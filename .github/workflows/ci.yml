# CI Pipeline for palai
# Runs on every push to main/develop and on pull requests to main.
# Pipeline order: Lint+Typecheck and Unit Tests run in parallel first,
# then Build (which depends on both), then E2E Tests (which depends on Build).
# Security Scan runs independently in parallel with everything else.

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

# Shared environment variables required for the Next.js build (Supabase).
# Set these secrets in: GitHub repo → Settings → Secrets and variables → Actions
env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Lint and TypeScript type-check (fast gate, runs first in parallel)
  # ─────────────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type-check
        run: npm run typecheck

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Unit tests via Vitest (runs in parallel with lint-and-typecheck)
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (verbose)
        run: npm run test -- --reporter=verbose

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3: Build (depends on both lint-and-typecheck and unit-tests passing)
  # Uploads the .next build artifact so the E2E job can reuse it.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build

      # Upload the compiled .next directory so the E2E job doesn't have to
      # rebuild from scratch. Artifact is retained for 1 day (CI artifact only).
      - name: Upload .next build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4: End-to-end tests via Playwright (depends on build)
  # Downloads the .next artifact, starts the app, then runs the E2E suite.
  # ─────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Restore the pre-built .next directory from the build job
      - name: Download .next build artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-build
          path: .next

      # Install only the Chromium browser to keep the step fast
      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      # Start the production server in the background, then wait until
      # http://localhost:3000 is accepting connections before running tests.
      - name: Start application server
        run: |
          npm run start &
          echo "Waiting for server to be ready on port 3000..."
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      # Always upload the HTML report on failure so it can be inspected
      # in the GitHub Actions "Artifacts" section of the failed run.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 5: Security scan (independent — runs in parallel with everything)
  # Checks for known vulnerabilities in dependencies and hardcoded secrets.
  # ─────────────────────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    # No `needs:` — intentionally runs in parallel with the rest of the pipeline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Fail the job only on critical-severity vulnerabilities to avoid
      # noise from low/moderate advisories during development.
      - name: Run npm audit (critical only)
        run: npm audit --audit-level=critical

      # Rudimentary secrets scan: look for patterns that should never be
      # committed to source. The `|| echo` ensures a non-zero grep exit code
      # (no matches found) is treated as success.
      - name: Scan source for hardcoded secrets
        run: |
          echo "Scanning src/ for potential hardcoded secrets..."
          grep -rn \
            "SUPABASE_SERVICE_ROLE_KEY\|sk-\|password.*=.*['\"]" \
            src/ \
            --include="*.ts" \
            --include="*.tsx" \
            || echo "No hardcoded secrets found"
